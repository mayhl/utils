# mu dev toolchain — base CLI tier, installed by `mu setup toolchain` via mise.
# Embedded in the mu binary so a fresh box needs no .config clone to know what to
# install (the self-contained win). Relocated from ~/.config/mise/config.toml.
# Print the effective copy with `mu setup toolchain --dump-manifest`.
[tools]
# delta pinned to 0.18.2 — the last release with an x86_64-apple-darwin prebuilt
# (0.19+ is arm-mac-only). matching=musl: the gnu build needs glibc 2.29+ and HPC
# login nodes sit at 2.28; musl is static. Linux-only in practice (mac = brew).
"github:dandavison/delta" = { version = "0.18.2", matching = "musl" } # syntax-highlighting diff/log pager
difftastic = "latest"                                                 # structural tree-sitter diff (git dft)
